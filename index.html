<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hAITerapis - Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; height: 100%; width: 100%; }
        .page.active { display: block; }
        
        /* Teknik Zoom-In: Mengambil bagian tengah gambar agar memenuhi layar */
        .mobile-screen-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ini yang akan membuat gambar memenuhi layar */
            object-position: center; /* Fokus ke tengah gambar */
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <h2 class="mb-4 text-xl font-bold text-slate-700">Preview hAITerapis</h2>

    <div class="relative bg-black p-3 rounded-[3rem] shadow-2xl w-[320px] h-[650px] border-4 border-gray-800 overflow-hidden">
        
        <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-28 h-5 bg-black rounded-b-xl z-50"></div>

        <div class="bg-white rounded-[2rem] h-full w-full overflow-hidden relative">
            
            <div id="page1" class="page active">
                <img src="Tampilan-1.png" class="mobile-screen-img">
            </div>

            <div id="page2" class="page">
                <img src="Tampilan-2.png" class="mobile-screen-img">
            </div>

            <div id="page3" class="page">
                <img src="Tampilan-3.png" class="mobile-screen-img">
            </div>

            <div id="page4" class="page">
                <img src="Tampilan-4.png" class="mobile-screen-img">
            </div>

            <div id="page5" class="page">
                <img src="Tampilan-5.png" class="mobile-screen-img">
            </div>

        </div>

        <div class="absolute bottom-5 left-0 w-full flex justify-center gap-2 z-50">
            <button onclick="changePage(1)" class="w-8 h-8 rounded-full bg-black/50 hover:bg-black/80 border border-white/30 text-white text-xs font-bold backdrop-blur-md">1</button>
            <button onclick="changePage(2)" class="w-8 h-8 rounded-full bg-black/50 hover:bg-black/80 border border-white/30 text-white text-xs font-bold backdrop-blur-md">2</button>
            <button onclick="changePage(3)" class="w-8 h-8 rounded-full bg-black/50 hover:bg-black/80 border border-white/30 text-white text-xs font-bold backdrop-blur-md">3</button>
            <button onclick="changePage(4)" class="w-8 h-8 rounded-full bg-black/50 hover:bg-black/80 border border-white/30 text-white text-xs font-bold backdrop-blur-md">4</button>
            <button onclick="changePage(5)" class="w-8 h-8 rounded-full bg-black/50 hover:bg-black/80 border border-white/30 text-white text-xs font-bold backdrop-blur-md">5</button>
        </div>
    </div>

    <p class="mt-4 text-[10px] text-gray-400">Klik angka untuk ganti halaman</p>

    <script>
        function changePage(pageNum) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById('page' + pageNum).classList.add('active');
        }
    </script>

</body>
</html>
