<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hAITerapis Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .active { display: block; }
        /* Agar gambar pas dengan layar HP */
        .mobile-img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen p-4">

    <div class="relative bg-black p-3 rounded-[3rem] shadow-2xl w-[375px] h-[750px] border-4 border-gray-800 overflow-hidden">
        
        <div class="bg-white rounded-[2.2rem] h-full w-full overflow-y-auto no-scrollbar relative">
            
            <div id="p1" class="page active">
                <img src="Tampilan-1.png" alt="Beranda" class="mobile-img">
            </div>

            <div id="p2" class="page">
                <img src="Tampilan-2.png" alt="Matching AI" class="mobile-img">
            </div>

            <div id="p3" class="page">
                <img src="Tampilan-3.png" alt="Jadwal" class="mobile-img">
            </div>

            <div id="p4" class="page">
                <img src="Tampilan-4.png" alt="Profil" class="mobile-img">
            </div>

            <div id="p5" class="page">
                <img src="Tampilan-5.png" alt="Logbook" class="mobile-img">
            </div>

        </div>

        <div class="absolute bottom-10 left-0 w-full flex justify-center gap-2 px-4">
            <button onclick="show(1)" class="bg-white/20 hover:bg-white/50 text-[10px] p-2 rounded-full text-white border border-white/30">1</button>
            <button onclick="show(2)" class="bg-white/20 hover:bg-white/50 text-[10px] p-2 rounded-full text-white border border-white/30">2</button>
            <button onclick="show(3)" class="bg-white/20 hover:bg-white/50 text-[10px] p-2 rounded-full text-white border border-white/30">3</button>
            <button onclick="show(4)" class="bg-white/20 hover:bg-white/50 text-[10px] p-2 rounded-full text-white border border-white/30">4</button>
            <button onclick="show(5)" class="bg-white/20 hover:bg-white/50 text-[10px] p-2 rounded-full text-white border border-white/30">5</button>
        </div>
    </div>

    <script>
        function show(num) {
            // Sembunyikan semua gambar
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Tampilkan gambar yang dipilih
            document.getElementById('p' + num).classList.add('active');
        }
    </script>
</body>
</html>
