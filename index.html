<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hAITerapis - Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menghilangkan scrollbar agar bersih */
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f2f5; }
        .page { display: none; height: 100vh; width: 100vw; }
        .page.active { display: flex; justify-content: center; align-items: center; }
        
        /* Menampilkan gambar asli kamu secara utuh dan proporsional */
        .mobile-img {
            height: 100%;
            width: auto;
            max-width: 100%;
            object-fit: contain; /* Menjaga agar gambar tidak terpotong */
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* Navigasi melayang di bawah */
        .nav-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .nav-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: #4FA1A9;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .nav-btn:hover { transform: scale(1.1); }
        .nav-btn.active { background: #011F26; outline: 3px solid #4FA1A9; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <img src="Tampilan-1.png" class="mobile-img">
    </div>

    <div id="p2" class="page">
        <img src="Tampilan-2.png" class="mobile-img">
    </div>

    <div id="p3" class="page">
        <img src="Tampilan-3.png" class="mobile-img">
    </div>

    <div id="p4" class="page">
        <img src="Tampilan-4.png" class="mobile-img">
    </div>

    <div id="p5" class="page">
        <img src="Tampilan-5.png" class="mobile-img">
    </div>

    <div class="nav-container">
        <button onclick="show(1)" class="nav-btn active" id="btn1">1</button>
        <button onclick="show(2)" class="nav-btn" id="btn2">2</button>
        <button onclick="show(3)" class="nav-btn" id="btn3">3</button>
        <button onclick="show(4)" class="nav-btn" id="btn4">4</button>
        <button onclick="show(5)" class="nav-btn" id="btn5">5</button>
    </div>

    <script>
        function show(n) {
            // Sembunyikan semua halaman
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Tampilkan halaman yang dipilih
            document.getElementById('p' + n).classList.add('active');

            // Update warna tombol
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + n).classList.add('active');
        }
    </script>

</body>
</html>
